# 白泽 — 投资者偏好配置文件
# 进入路由管道前由 InvestorPreferenceLoader 读取

# 身份与目标
risk_profile: balanced          # conservative / balanced / aggressive
investment_goal: absolute_return  # absolute_return / relative_return / cash_flow
trading_style: mixed            # long_term / swing / mixed
tier: beginner                  # beginner / intermediate / pro
benchmark: 沪深300
investment_horizon: 3-5年

# 仓位约束
limits:
  total_capital: 500000
  max_single_pct: 0.20
  max_sector_pct: 0.40
  max_total_exposure: 0.80
  min_cash_pct: 0.20
  single_stop_loss_pct: 0.02
  portfolio_drawdown_pct: 0.15
  gem_discount: 0.80

# L2 评分权重覆盖 (null = 使用系统默认，基于 risk_profile + investment_goal)
score_weights:
  fundamental: null
  technical: null
  macro: null
  sector: null
  sentiment: null

# 启用的军规 (null = 基于 tier 自动决定)
enabled_rules: null

# 能力圈: 行业 → 熟悉度 1-5
# 5=从业者/深度跟踪 4=深入研究 3=基本了解 2=略知一二 1=听说过
# 💡 运行 `python -m src.cli preference setup` 可交互式设置
circle_of_competence:
  消费: 3
  新能源: 2
  科技: 2
  # 常见行业参考: 医药、金融、制造、通信、半导体、白酒、汽车、互联网、军工、地产
